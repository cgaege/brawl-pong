<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Brawl Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 40%, #2e0d5e 0%, #120620 65%, #09030f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Floating background stars */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 12%  18%, rgba(255,220,80,0.7)  0%, transparent 100%),
        radial-gradient(1px   1px   at 88%  25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(2px   2px   at 34%  72%, rgba(255,220,80,0.5)  0%, transparent 100%),
        radial-gradient(1px   1px   at 66%  8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5%   55%, rgba(200,150,255,0.5) 0%, transparent 100%),
        radial-gradient(1px   1px   at 92%  68%, rgba(255,220,80,0.4)  0%, transparent 100%),
        radial-gradient(2px   2px   at 50%  90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px   1px   at 78%  82%, rgba(200,150,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 22%  40%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.6; }
      50%  { opacity: 1.0; }
      100% { opacity: 0.5; }
    }

    /* Outer glow pulse around the whole frame */
    .arena-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* The decorative frame around the canvas */
    .arena-frame {
      position: relative;
      padding: 10px;
      background: linear-gradient(145deg, #f5c400, #c49000 40%, #7a5200 60%, #f5c400);
      border-radius: 14px;
      box-shadow:
        0 0 0 4px #1b1035,
        0 0 0 7px #7a5200,
        0 0 30px 8px rgba(245,196,0,0.45),
        0 0 70px 20px rgba(140,60,255,0.3),
        0 0 120px 40px rgba(80,20,160,0.2),
        inset 0 0 20px rgba(0,0,0,0.5);
      animation: frameGlow 3s ease-in-out infinite alternate;
    }
    @keyframes frameGlow {
      0%   { box-shadow: 0 0 0 4px #1b1035, 0 0 0 7px #7a5200, 0 0 25px 6px rgba(245,196,0,0.4),  0 0 60px 18px rgba(140,60,255,0.25), inset 0 0 20px rgba(0,0,0,0.5); }
      100% { box-shadow: 0 0 0 4px #1b1035, 0 0 0 7px #7a5200, 0 0 45px 14px rgba(245,196,0,0.65), 0 0 90px 30px rgba(180,80,255,0.45), inset 0 0 20px rgba(0,0,0,0.5); }
    }

    /* Corner star badges */
    .arena-frame::before,
    .arena-frame::after {
      content: '★';
      position: absolute;
      font-size: 22px;
      color: #fff;
      text-shadow: 0 0 8px #f5c400, 0 0 18px #f5c400;
      line-height: 1;
    }
    .arena-frame::before { top: -4px;  left: -4px;  transform: translate(-40%, -40%); }
    .arena-frame::after  { top: -4px;  right: -4px; transform: translate(40%, -40%);  }
    .corner-star-bl,
    .corner-star-br {
      position: absolute;
      font-size: 22px;
      color: #fff;
      text-shadow: 0 0 8px #f5c400, 0 0 18px #f5c400;
      line-height: 1;
      pointer-events: none;
    }
    .corner-star-bl { bottom: -4px; left:  -4px; transform: translate(-40%, 40%); }
    .corner-star-br { bottom: -4px; right: -4px; transform: translate(40%,  40%); }

    /* Title bar above canvas */
    .arena-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #1b1035;
      text-shadow: none;
      text-align: center;
      margin-bottom: 6px;
      user-select: none;
    }

    canvas { display: block; border-radius: 4px; }

    #info {
      margin-top: 14px;
      padding: 6px 18px;
      font-size: 12px;
      color: #c8b8e8;
      text-align: center;
      letter-spacing: 1.5px;
      background: rgba(30,10,60,0.6);
      border: 1px solid rgba(245,196,0,0.2);
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="arena-wrap">
    <div class="arena-frame">
      <div class="arena-title">⚡ BRAWL PONG ⚡</div>
      <canvas id="pong" width="800" height="500"></canvas>
      <span class="corner-star-bl">★</span>
      <span class="corner-star-br">★</span>
    </div>
    <div id="info"></div>
  </div>

  <script>
    const canvas = document.getElementById('pong');
    const ctx = canvas.getContext('2d');
    const infoEl = document.getElementById('info');

    const W = canvas.width;
    const H = canvas.height;
    const PADDLE_W = 14;
    const PADDLE_H = 80;
    const COOP_PADDLE_H = 58;
    const BALL_SIZE = 14;
    const PADDLE_SPEED = 5;
    const WIN_SCORE = 7;

    // ── Brawl Stars Palette ───────────────────────────────────────────────────
    const C = {
      bg:          '#1b1035',
      bgGrid:      '#221445',
      lane:        '#2a1a50',
      accent:      '#f5c400',   // gold
      accentDark:  '#c49000',
      paddle1:     '#f5c400',   // gold
      paddle1Dark: '#a06800',
      paddle2:     '#e84040',   // red (bot/opponent)
      paddle2Dark: '#8b1a1a',
      coopP3:      '#40c8e8',   // cyan second coop player
      coopP3Dark:  '#1a7a99',
      gem:         '#e84040',
      gemShine:    '#ff9999',
      gemDark:     '#8b0000',
      uiBg:        '#2d1b5e',
      uiBorder:    '#f5c400',
      uiShadow:    '#000',
      textGold:    '#f5c400',
      textWhite:   '#ffffff',
      textGray:    '#a89fc0',
      starBg:      '#ffffff',
    };

    // ── Brawler draw functions ────────────────────────────────────────────────

    function drawShelly(ctx, cx, cy, size) {
      ctx.save();
      const s = size;
      // Background circle
      ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI * 2);
      ctx.fillStyle = '#e8608a'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Face
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.05, s * 0.68, 0, Math.PI * 2);
      ctx.fillStyle = '#f0c090'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Hair (top arc, brown)
      ctx.beginPath(); ctx.arc(cx, cy - s * 0.1, s * 0.68, Math.PI, 0);
      ctx.fillStyle = '#6b3a2a'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5; ctx.stroke();
      // Eyes
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath(); ctx.arc(cx - s * 0.22, cy, s * 0.09, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.22, cy, s * 0.09, 0, Math.PI * 2); ctx.fill();
      // Pink cheeks
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#ff80a0';
      ctx.beginPath(); ctx.arc(cx - s * 0.35, cy + s * 0.12, s * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.35, cy + s * 0.12, s * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // Smile
      ctx.beginPath();
      ctx.arc(cx, cy + s * 0.15, s * 0.22, 0.15, Math.PI - 0.15);
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    function drawColt(ctx, cx, cy, size) {
      ctx.save();
      const s = size;
      // Background circle
      ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI * 2);
      ctx.fillStyle = '#2255aa'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Sheriff hat (blue, wide brim)
      ctx.fillStyle = '#2255aa';
      ctx.beginPath();
      ctx.rect(cx - s * 0.52, cy - s * 0.55, s * 1.04, s * 0.18); // brim
      ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath();
      ctx.rect(cx - s * 0.35, cy - s * 0.88, s * 0.7, s * 0.38); // crown
      ctx.fillStyle = '#1a3e8a'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Hat band
      ctx.fillStyle = '#f5c400';
      ctx.fillRect(cx - s * 0.35, cy - s * 0.58, s * 0.7, s * 0.1);
      // Face
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.1, s * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = '#f5d5a0'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Blonde hair sides
      ctx.fillStyle = '#d4a800';
      ctx.beginPath(); ctx.arc(cx - s * 0.52, cy + s * 0.05, s * 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.52, cy + s * 0.05, s * 0.2, 0, Math.PI * 2); ctx.fill();
      // Determined eyes (angular)
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath(); ctx.arc(cx - s * 0.2, cy + s * 0.05, s * 0.09, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.2, cy + s * 0.05, s * 0.09, 0, Math.PI * 2); ctx.fill();
      // Eyebrows (straight, determined)
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(cx - s * 0.31, cy - s * 0.1); ctx.lineTo(cx - s * 0.1, cy - s * 0.08); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + s * 0.31, cy - s * 0.1); ctx.lineTo(cx + s * 0.1, cy - s * 0.08); ctx.stroke();
      // Mouth (thin line)
      ctx.beginPath(); ctx.moveTo(cx - s * 0.15, cy + s * 0.25); ctx.lineTo(cx + s * 0.15, cy + s * 0.25);
      ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    function drawBull(ctx, cx, cy, size) {
      ctx.save();
      const s = size;
      // Background circle
      ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI * 2);
      ctx.fillStyle = '#cc3333'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Horns (dark, curved)
      ctx.fillStyle = '#3a2010';
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.3, cy - s * 0.55);
      ctx.bezierCurveTo(cx - s * 0.55, cy - s * 0.9, cx - s * 0.75, cy - s * 0.75, cx - s * 0.6, cy - s * 0.5);
      ctx.bezierCurveTo(cx - s * 0.45, cy - s * 0.55, cx - s * 0.4, cy - s * 0.5, cx - s * 0.3, cy - s * 0.55);
      ctx.fill(); ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + s * 0.3, cy - s * 0.55);
      ctx.bezierCurveTo(cx + s * 0.55, cy - s * 0.9, cx + s * 0.75, cy - s * 0.75, cx + s * 0.6, cy - s * 0.5);
      ctx.bezierCurveTo(cx + s * 0.45, cy - s * 0.55, cx + s * 0.4, cy - s * 0.5, cx + s * 0.3, cy - s * 0.55);
      ctx.fill(); ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5; ctx.stroke();
      // Wide round face
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.05, s * 0.72, 0, Math.PI * 2);
      ctx.fillStyle = '#cc3333'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Angry eyebrows
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx - s * 0.38, cy - s * 0.22); ctx.lineTo(cx - s * 0.12, cy - s * 0.1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + s * 0.38, cy - s * 0.22); ctx.lineTo(cx + s * 0.12, cy - s * 0.1); ctx.stroke();
      // Eyes (small, mean)
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath(); ctx.arc(cx - s * 0.22, cy, s * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.22, cy, s * 0.1, 0, Math.PI * 2); ctx.fill();
      // Nose ring (silver circle)
      ctx.beginPath(); ctx.arc(cx, cy + s * 0.28, s * 0.13, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fill();
      ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 3; ctx.stroke();
      // Nostrils
      ctx.fillStyle = '#882222';
      ctx.beginPath(); ctx.arc(cx - s * 0.08, cy + s * 0.28, s * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.08, cy + s * 0.28, s * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawSpike(ctx, cx, cy, size) {
      ctx.save();
      const s = size;
      // Background circle
      ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI * 2);
      ctx.fillStyle = '#4a9a3a'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Spikes (small triangles around the head)
      ctx.fillStyle = '#3a7a2a';
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5;
      const spikeCount = 8;
      const headR = s * 0.62;
      for (let i = 0; i < spikeCount; i++) {
        const angle = (Math.PI * 2 / spikeCount) * i - Math.PI / 2;
        const tx = cx + Math.cos(angle) * (headR + s * 0.22);
        const ty = cy + Math.sin(angle) * (headR + s * 0.22);
        const l = cx + Math.cos(angle) * headR;
        const r2 = cy + Math.sin(angle) * headR;
        const perpX = Math.cos(angle + Math.PI / 2) * s * 0.1;
        const perpY = Math.sin(angle + Math.PI / 2) * s * 0.1;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(l + perpX, r2 + perpY);
        ctx.lineTo(l - perpX, r2 - perpY);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }
      // Green head
      ctx.beginPath(); ctx.arc(cx, cy, headR, 0, Math.PI * 2);
      ctx.fillStyle = '#4a9a3a'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Dot eyes
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath(); ctx.arc(cx - s * 0.2, cy - s * 0.08, s * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.2, cy - s * 0.08, s * 0.1, 0, Math.PI * 2); ctx.fill();
      // Rosy cheeks
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#ff6080';
      ctx.beginPath(); ctx.arc(cx - s * 0.32, cy + s * 0.12, s * 0.14, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.32, cy + s * 0.12, s * 0.14, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // Smile
      ctx.beginPath();
      ctx.arc(cx, cy + s * 0.12, s * 0.18, 0.2, Math.PI - 0.2);
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    function drawBrock(ctx, cx, cy, size) {
      ctx.save();
      const s = size;
      // Background circle
      ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI * 2);
      ctx.fillStyle = '#ff6600'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Face (tall oval)
      ctx.beginPath();
      ctx.ellipse(cx, cy + s * 0.05, s * 0.55, s * 0.65, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#fde8c8'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      // Spiky orange hair
      ctx.fillStyle = '#ff6600';
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5;
      const spikes = [[-0.35, -0.7], [-0.15, -0.85], [0, -0.9], [0.15, -0.85], [0.35, -0.7]];
      spikes.forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.moveTo(cx + ox * s, cy + oy * s);
        ctx.lineTo(cx + (ox - 0.12) * s, cy + (oy + 0.25) * s);
        ctx.lineTo(cx + (ox + 0.12) * s, cy + (oy + 0.25) * s);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      });
      // Hair base (orange arc covering top)
      ctx.beginPath();
      ctx.arc(cx, cy - s * 0.15, s * 0.55, Math.PI, 0);
      ctx.fillStyle = '#ff6600'; ctx.fill();
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 1.5; ctx.stroke();
      // Sunglasses (dark rect across eyes)
      const glassY = cy - s * 0.1;
      ctx.fillStyle = '#111';
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2;
      // Left lens
      ctx.beginPath();
      ctx.rect(cx - s * 0.48, glassY - s * 0.13, s * 0.38, s * 0.24);
      ctx.fill(); ctx.stroke();
      // Right lens
      ctx.beginPath();
      ctx.rect(cx + s * 0.1, glassY - s * 0.13, s * 0.38, s * 0.24);
      ctx.fill(); ctx.stroke();
      // Bridge
      ctx.beginPath(); ctx.moveTo(cx - s * 0.1, glassY); ctx.lineTo(cx + s * 0.1, glassY);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.stroke();
      // Shine on glasses
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#fff';
      ctx.fillRect(cx - s * 0.44, glassY - s * 0.11, s * 0.14, s * 0.09);
      ctx.fillRect(cx + s * 0.14, glassY - s * 0.11, s * 0.14, s * 0.09);
      ctx.globalAlpha = 1;
      // Mouth (cool smirk)
      ctx.beginPath();
      ctx.arc(cx + s * 0.1, cy + s * 0.3, s * 0.18, Math.PI + 0.3, Math.PI * 2 - 0.1);
      ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    // ── Brawler selection data ────────────────────────────────────────────────
    const CDN = 'https://cdn.brawlify.com/brawlers/borderless';
    const BRAWLERS = [
      { id: 'shelly', name: 'Shelly', color: '#e8608a', imgId: 16000000, fallback: drawShelly },
      { id: 'colt',   name: 'Colt',   color: '#2255aa', imgId: 16000001, fallback: drawColt   },
      { id: 'bull',   name: 'Bull',   color: '#cc3333', imgId: 16000002, fallback: drawBull   },
      { id: 'brock',  name: 'Brock',  color: '#ff6600', imgId: 16000003, fallback: drawBrock  },
      { id: 'spike',  name: 'Spike',  color: '#4a9a3a', imgId: 16000005, fallback: drawSpike  },
    ];

    // Preload all brawler images
    BRAWLERS.forEach(b => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = `${CDN}/${b.imgId}.png`;
      b.img = img;
    });

    // Draw brawler portrait — image if loaded, fallback to canvas drawing
    function drawBrawlerPortrait(brawler, cx, cy, size) {
      if (brawler.img?.complete && brawler.img.naturalWidth > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, size, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(brawler.img, cx - size, cy - size, size * 2, size * 2);
        ctx.restore();
      } else {
        brawler.fallback(ctx, cx, cy, size);
      }
    }

    let selectedBrawler = { p1: BRAWLERS[0], p2: BRAWLERS[1], p3: BRAWLERS[2] };
    let brawlerCursor = { p1: 0, p2: 1, p3: 2 };
    let brawlerTurn = 'p1'; // 'p1' | 'p2' | 'p3' — whose turn it is to pick

    // ── Sound ─────────────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(frequency, duration, type = 'square', volume = 0.3) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }

    const sound = {
      paddle: () => { playBeep(300, 0.04, 'square', 0.25); playBeep(500, 0.06, 'square', 0.15); },
      wall:   () => playBeep(200, 0.05, 'sawtooth', 0.2),
      score: () => {
        const bufferSize = audioCtx.sampleRate * 0.8;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(900, audioCtx.currentTime);
        filter.frequency.linearRampToValueAtTime(2800, audioCtx.currentTime + 0.4);
        filter.Q.value = 1.5;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 0.8);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + 0.8);
        [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playBeep(f, 0.2, 'square', 0.18), i * 65));
      },
      win: () => {
        [523, 659, 784, 659, 1047].forEach((f, i) => setTimeout(() => playBeep(f, 0.18, 'square', 0.25), i * 100));
      },
    };

    // ── State ─────────────────────────────────────────────────────────────────
    const state = { mode: 'menu', menuPage: 'mode', paused: false, over: false, winner: null, gameMode: 'solo', vsTimer: 0, serving: false, serveDirection: 1 };

    // Avatar reaction animation state
    const avatarAnim = {
      p1: { type: null, life: 0 },
      p2: { type: null, life: 0 },
      p3: { type: null, life: 0 },
    };

    const DIFFICULTIES = {
      leicht: { speed: 2.8, errorMargin: 55, predictionNoise: 3 },
      mittel: { speed: 4.2, errorMargin: 20, predictionNoise: 1 },
      schwer: { speed: 6.5, errorMargin: 4,  predictionNoise: 0 },
    };
    let difficulty = 'mittel';
    let botTarget = H / 2;
    let botError = 0;

    const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, speed: 3 };
    const p1 = { y: H / 2 - PADDLE_H / 2, score: 0, up: false, down: false };
    const p2 = { y: H / 2 - PADDLE_H / 2, score: 0, up: false, down: false };
    const p3 = { y: H / 2 + 10,           score: 0, up: false, down: false };

    // Particles for hit effects and win screen
    const particles = [];

    // Ball trail positions
    const trail = [];
    const TRAIL_LEN = 10;

    // Score flash state
    let scoreFlash = { active: false, x: 0, y: 0, life: 0, color: '#fff' };

    // Shockwave rings on goal
    const shockwaves = [];

    // Screen shake
    let shake = { x: 0, y: 0, life: 0 };

    // Floating +1 popup texts
    const popups = [];

    // ── Power-ups (Schild) ────────────────────────────────────────────────────
    const SHIELD_TYPE = { id: 'shield', label: '🛡 SCHILD', color: '#a78bfa', duration: 10 };

    const powerUps = [];   // power-up items floating on field
    const effects  = { p1: null, p2: null };  // { type, timeLeft }

    function spawnPowerUp(x, y) {
      powerUps.push({ x, y, type: SHIELD_TYPE, pulse: 0 });
    }

    function applyEffect(side, type) {
      effects[side] = { type, timeLeft: type.duration };
      popups.push({
        x: side === 'p1' ? W / 4 : 3 * W / 4,
        y: H / 2 - 40,
        life: 1.8,
        color: type.color,
        label: '🛡 SCHILD AKTIV!',
      });
    }

    function clearEffects() { effects.p1 = null; effects.p2 = null; }

    // Shield wall x positions
    const SHIELD_X = { p1: 6, p2: W - 6 };

    // Called each frame: bounce ball off shield wall if active
    function checkShieldCollisions() {
      if (effects.p1?.type.id === 'shield' && ball.vx < 0 && ball.x - BALL_SIZE / 2 <= SHIELD_X.p1) {
        ball.x = SHIELD_X.p1 + BALL_SIZE / 2;
        ball.vx = Math.abs(ball.vx);
        spawnParticles(SHIELD_X.p1, ball.y, '#a78bfa', 10, true);
        shockwaves.push({ x: SHIELD_X.p1, y: ball.y, r: 10, life: 1, color: '#a78bfa', maxR: 100 });
        sound.paddle();
      }
      if (effects.p2?.type.id === 'shield' && ball.vx > 0 && ball.x + BALL_SIZE / 2 >= SHIELD_X.p2) {
        ball.x = SHIELD_X.p2 - BALL_SIZE / 2;
        ball.vx = -Math.abs(ball.vx);
        spawnParticles(SHIELD_X.p2, ball.y, '#a78bfa', 10, true);
        shockwaves.push({ x: SHIELD_X.p2, y: ball.y, r: 10, life: 1, color: '#a78bfa', maxR: 100 });
        sound.paddle();
      }
    }

    function effectiveSpeed(base, side) { return base; }
    function effectivePaddleH(paddle, side) { return paddleH(paddle); }

    // ── Obstacles (crates) ────────────────────────────────────────────────────
    const CRATE_DEFS = [
      { cx: W/2 - 140, cy: H/2,    size: 30, maxHp: 3 },
      { cx: W/2 + 140, cy: H/2,    size: 30, maxHp: 3 },
      { cx: W/2,       cy: 60,     size: 26, maxHp: 2 },
      { cx: W/2,       cy: H - 60, size: 26, maxHp: 2 },
    ];

    let obstacles = [];

    function initObstacles() {
      obstacles = CRATE_DEFS.map(d => ({
        ...d,
        hp: d.maxHp,
        dead: false,
        hitLife: 0,   // flash timer on hit
      }));
    }

    // Debris particles when a crate is destroyed
    function spawnDebris(cx, cy, size) {
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x: cx + (Math.random() - 0.5) * size,
          y: cy + (Math.random() - 0.5) * size,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1, color: i % 3 === 0 ? '#c8903a' : (i % 3 === 1 ? '#8B5E3C' : '#f5c400'),
          size: 3 + Math.random() * 5,
          star: i % 4 === 0,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.4,
        });
      }
      shockwaves.push({ x: cx, y: cy, r: 10, life: 1, color: '#c8903a', maxR: 80 });
    }

    function checkObstacleCollisions() {
      for (const obs of obstacles) {
        if (obs.dead) continue;
        const half = obs.size / 2;
        const bx = ball.x, by = ball.y, br = BALL_SIZE / 2;
        const left = obs.cx - half, right = obs.cx + half;
        const top  = obs.cy - half, bottom = obs.cy + half;

        if (bx + br < left || bx - br > right || by + br < top || by - br > bottom) continue;

        // Determine which side was hit
        const overlapL = (bx + br) - left;
        const overlapR = right - (bx - br);
        const overlapT = (by + br) - top;
        const overlapB = bottom - (by - br);
        const minH = Math.min(overlapL, overlapR);
        const minV = Math.min(overlapT, overlapB);

        if (minH < minV) {
          ball.vx *= -1;
          ball.x += overlapL < overlapR ? -(overlapL + 1) : (overlapR + 1);
        } else {
          ball.vy *= -1;
          ball.y += overlapT < overlapB ? -(overlapT + 1) : (overlapB + 1);
        }

        obs.hp--;
        obs.hitLife = 1;
        spawnParticles(ball.x, ball.y, '#c8903a', 6);
        sound.paddle();

        if (obs.hp <= 0) {
          obs.dead = true;
          spawnDebris(obs.cx, obs.cy, obs.size);
          shake = { x: 0, y: 0, life: 0.6 };
          spawnPowerUp(obs.cx, obs.cy);
        }
        break; // one collision per frame
      }
    }

    function spawnParticles(x, y, color, count = 8, star = false) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1, color,
          size: 3 + Math.random() * 4,
          star,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.3,
        });
      }
    }

    function spawnGoalEffect(x, y, color, scoreX) {
      // 1. Screen shake
      shake = { x: 0, y: 0, life: 1 };

      // 2. Three delayed shockwave rings
      [0, 80, 160].forEach(delay => {
        setTimeout(() => {
          shockwaves.push({ x, y, r: 10, life: 1, color, maxR: 180 });
        }, delay);
      });

      // 3. Massive star + gem burst at impact point
      spawnParticles(x, y, color,       14, true);
      spawnParticles(x, y, '#ffffff',   10, false);
      spawnParticles(x, y, C.accent,     8, true);
      // Extra fast outward gems
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        const speed = 6 + Math.random() * 5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.2, color,
          size: 6 + Math.random() * 5,
          star: false,
          rot: 0, rotV: 0,
        });
      }

      // 4. +1 popup floating up on scorer's side
      popups.push({ x: scoreX, y: H / 2 + 20, life: 1, color });
    }

    function spawnWinParticles() {
      const colors = [C.accent, '#fff', '#ff6060', C.coopP3, '#ff88ff'];
      for (let i = 0; i < 60; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H * 0.6;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const angle = Math.PI * 0.3 + Math.random() * Math.PI * 1.4;
        const speed = 3 + Math.random() * 6;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: -Math.abs(Math.sin(angle) * speed) - 2,
          life: 1 + Math.random() * 0.5,
          color, size: 5 + Math.random() * 7,
          star: Math.random() > 0.4,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.25,
        });
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function paddleH(paddle) {
      return state.gameMode === 'coop' && (paddle === p1 || paddle === p3) ? COOP_PADDLE_H : PADDLE_H;
    }

    function resetBall(direction = 1) {
      ball.x = W / 2; ball.y = H / 2;
      ball.vx = 0; ball.vy = 0;
      botTarget = H / 2;
      botError = (Math.random() * 2 - 1) * DIFFICULTIES[difficulty].errorMargin;
      state.serving = true;
      state.serveDirection = direction;
    }

    function serveBall() {
      const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
      ball.vx = state.serveDirection * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
      state.serving = false;
    }

    function startGame() {
      // Assign brawlers from selection; bot gets random brawler in solo/coop
      selectedBrawler.p1 = BRAWLERS[brawlerCursor.p1];
      if (state.gameMode === 'duo') {
        selectedBrawler.p2 = BRAWLERS[brawlerCursor.p2];
      } else if (state.gameMode === 'coop') {
        selectedBrawler.p3 = BRAWLERS[brawlerCursor.p3];
        const botOptions = BRAWLERS.filter(b => b.id !== selectedBrawler.p1.id && b.id !== selectedBrawler.p3.id);
        selectedBrawler.p2 = botOptions[Math.floor(Math.random() * botOptions.length)];
      } else {
        const botOptions = BRAWLERS.filter(b => b.id !== selectedBrawler.p1.id);
        selectedBrawler.p2 = botOptions[Math.floor(Math.random() * botOptions.length)];
      }

      p1.score = 0; p2.score = 0;
      if (state.gameMode === 'coop') {
        p1.y = H / 2 - COOP_PADDLE_H - 5;
        p3.y = H / 2 + 5;
        p2.y = H / 2 - PADDLE_H / 2;
      } else {
        p1.y = H / 2 - PADDLE_H / 2;
        p2.y = H / 2 - PADDLE_H / 2;
      }
      ball.speed = 3;
      particles.length = 0;
      trail.length = 0;
      shockwaves.length = 0;
      popups.length = 0;
      powerUps.length = 0;
      clearEffects();
      shake.life = 0; shake.x = 0; shake.y = 0;
      scoreFlash.active = false;
      initObstacles();
      state.over = false; state.winner = null; state.paused = false;
      state.mode = 'playing';
      state.vsTimer = 2.0;
      avatarAnim.p1 = { type: null, life: 0 };
      avatarAnim.p2 = { type: null, life: 0 };
      avatarAnim.p3 = { type: null, life: 0 };
      resetBall(state.gameMode === 'duo' ? (Math.random() < 0.5 ? 1 : -1) : 1);
      updateInfo();
    }

    function clampPaddle(paddle) {
      const ph = paddleH(paddle);
      if (paddle.y < 0) paddle.y = 0;
      if (paddle.y + ph > H) paddle.y = H - ph;
    }

    function updateInfo() {
      if (state.gameMode === 'solo') {
        infoEl.textContent = `SPIELER: W/S oder ↑/↓  •  SCHWIERIGKEIT: ${difficulty.toUpperCase()}  •  ENTER: PAUSE`;
      } else if (state.gameMode === 'coop') {
        infoEl.textContent = `S1: W/S  •  S2: ↑/↓  •  SCHWIERIGKEIT: ${difficulty.toUpperCase()}  •  ENTER: PAUSE`;
      } else {
        infoEl.textContent = 'SPIELER 1: W/S  •  SPIELER 2: ↑/↓  •  ENTER: PAUSE';
      }
    }

    // ── Bot AI ────────────────────────────────────────────────────────────────
    function predictBallY() {
      const p2x = W - 20 - PADDLE_W;
      let x = ball.x, y = ball.y, vx = ball.vx, vy = ball.vy;
      for (let i = 0; i < 600; i++) {
        x += vx; y += vy;
        if (y < 0)  { y = -y;        vy =  Math.abs(vy); }
        if (y > H)  { y = 2*H - y;   vy = -Math.abs(vy); }
        if (x >= p2x) return y;
        if (x <= 20) vx = Math.abs(vx);
      }
      return H / 2;
    }

    function updateBot() {
      const diff = DIFFICULTIES[difficulty];
      botTarget = ball.vx > 0
        ? predictBallY() + botError + (Math.random() * 2 - 1) * diff.predictionNoise
        : H / 2;
      const center = p2.y + PADDLE_H / 2;
      const delta = botTarget - center;
      p2.y += Math.min(Math.abs(delta), diff.speed) * Math.sign(delta);
      clampPaddle(p2);
    }

    // ── Paddle collision ──────────────────────────────────────────────────────
    function checkPaddleHit(paddle, px, incomingVxSign, particleColor, side) {
      const ph = side ? effectivePaddleH(paddle, side) : paddleH(paddle);
      if (
        Math.sign(ball.vx) === incomingVxSign &&
        ball.x - BALL_SIZE / 2 <= px + PADDLE_W &&
        ball.x + BALL_SIZE / 2 >= px &&
        ball.y + BALL_SIZE / 2 >= paddle.y &&
        ball.y - BALL_SIZE / 2 <= paddle.y + ph
      ) {
        ball.x = incomingVxSign < 0
          ? px + PADDLE_W + BALL_SIZE / 2
          : px - BALL_SIZE / 2;
        const hitPos = (ball.y - (paddle.y + ph / 2)) / (ph / 2);
        const angle = hitPos * 60 * (Math.PI / 180);
        ball.speed = Math.min(ball.speed + 0.2, 9);
        ball.vx = -incomingVxSign * ball.speed * Math.cos(angle);
        ball.vy = ball.speed * Math.sin(angle);
        spawnParticles(ball.x, ball.y, particleColor);
        sound.paddle();
        return true;
      }
      return false;
    }

    // ── Update ────────────────────────────────────────────────────────────────
    function update() {
      if (state.mode !== 'playing' || state.paused || state.over) return;

      const dt = 1 / 60;

      // VS intro timer — block game logic while it counts down
      if (state.vsTimer > 0) {
        state.vsTimer -= dt;
        if (state.vsTimer < 0) state.vsTimer = 0;
        return;
      }

      // Tick avatar animations
      for (const side of ['p1', 'p2', 'p3']) {
        if (avatarAnim[side].life > 0) avatarAnim[side].life -= dt;
      }

      const isCoop = state.gameMode === 'coop';

      const sp1 = effectiveSpeed(PADDLE_SPEED, 'p1');
      const sp2 = effectiveSpeed(PADDLE_SPEED, 'p2');
      if (p1.up)   p1.y -= sp1;
      if (p1.down) p1.y += sp1;
      clampPaddle(p1);

      if (state.gameMode === 'duo') {
        if (p2.up)   p2.y -= sp2;
        if (p2.down) p2.y += sp2;
        clampPaddle(p2);
      } else {
        updateBot();
      }

      if (isCoop) {
        if (p3.up)   p3.y -= sp1;
        if (p3.down) p3.y += sp1;
        clampPaddle(p3);
      }

      // Ball sticks to serving paddle
      if (state.serving) {
        const p1x = 20;
        const p2x = W - 20 - PADDLE_W;
        if (state.serveDirection === 1) {
          // p1 serves — ball sticks to right edge of p1's paddle, follows its center
          ball.x = p1x + PADDLE_W + BALL_SIZE / 2 + 2;
          ball.y = p1.y + effectivePaddleH(p1, 'p1') / 2;
        } else {
          // p2 serves — ball sticks to left edge of p2's paddle
          ball.x = p2x - BALL_SIZE / 2 - 2;
          ball.y = p2.y + PADDLE_H / 2;
        }
        return;
      }

      // Ball trail
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > TRAIL_LEN) trail.shift();

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (scoreFlash.active) {
        scoreFlash.life -= 0.04;
        if (scoreFlash.life <= 0) scoreFlash.active = false;
      }

      // Shockwaves
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.r += (sw.maxR - sw.r) * 0.12;
        sw.life -= 0.035;
        if (sw.life <= 0) shockwaves.splice(i, 1);
      }

      // Popups
      for (let i = popups.length - 1; i >= 0; i--) {
        popups[i].y -= 1.5;
        popups[i].life -= 0.025;
        if (popups[i].life <= 0) popups.splice(i, 1);
      }

      // Screen shake decay
      if (shake.life > 0) {
        shake.life -= 0.08;
        const mag = shake.life * 10;
        shake.x = (Math.random() - 0.5) * mag;
        shake.y = (Math.random() - 0.5) * mag;
        if (shake.life <= 0) { shake.x = 0; shake.y = 0; }
      }

      if (ball.y - BALL_SIZE / 2 <= 0) {
        ball.y = BALL_SIZE / 2; ball.vy *= -1;
        spawnParticles(ball.x, 0, C.textWhite, 5);
        sound.wall();
      }
      if (ball.y + BALL_SIZE / 2 >= H) {
        ball.y = H - BALL_SIZE / 2; ball.vy *= -1;
        spawnParticles(ball.x, H, C.textWhite, 5);
        sound.wall();
      }

      checkShieldCollisions();
      checkObstacleCollisions();

      // Update obstacle hit flash
      for (const obs of obstacles) {
        if (obs.hitLife > 0) obs.hitLife -= 0.1;
      }

      // Power-up: animate + ball collision
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        pu.pulse = (pu.pulse + 0.08) % (Math.PI * 2);

        const dist = Math.hypot(ball.x - pu.x, ball.y - pu.y);
        if (dist < BALL_SIZE / 2 + 16) {
          // Which player hit it? The one whose side the ball came FROM
          const side = ball.vx > 0 ? 'p1' : 'p2';
          applyEffect(side, pu.type);
          spawnParticles(pu.x, pu.y, pu.type.color, 14, true);
          shockwaves.push({ x: pu.x, y: pu.y, r: 10, life: 1, color: pu.type.color, maxR: 80 });
          powerUps.splice(i, 1);
        }
      }

      // Tick active effects
      for (const side of ['p1', 'p2']) {
        if (effects[side]) {
          effects[side].timeLeft -= dt;
          if (effects[side].timeLeft <= 0) effects[side] = null;
        }
      }

      const p1x = 20;
      const p2x = W - 20 - PADDLE_W;

      if (!checkPaddleHit(p1, p1x, -1, C.accent, 'p1') && isCoop) {
        checkPaddleHit(p3, p1x, -1, C.coopP3, 'p1');
      }
      checkPaddleHit(p2, p2x, 1, C.paddle2, 'p2');

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.15;
        p.life -= 0.045;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (ball.x < 0) {
        p2.score++;
        ball.speed = 3;
        trail.length = 0;
        scoreFlash = { active: true, x: 3*W/4, y: H/2, life: 1, color: '#ff6060' };
        spawnGoalEffect(20, ball.y, '#ff6060', 3*W/4);
        // Avatar reactions: p2 scores → p2 bounces, p1 (and p3 in coop) shakes
        avatarAnim.p2 = { type: 'bounce', life: 0.6 };
        avatarAnim.p1 = { type: 'shake', life: 0.6 };
        if (state.gameMode === 'coop') avatarAnim.p3 = { type: 'shake', life: 0.6 };
        const botWins = state.gameMode === 'duo' ? 'Spieler 2' : 'Bot';
        if (p2.score >= WIN_SCORE) { state.over = true; state.winner = botWins; sound.win(); spawnWinParticles(); }
        else { sound.score(); resetBall(1); initObstacles(); powerUps.length = 0; clearEffects(); }
      }
      if (ball.x > W) {
        p1.score++;
        ball.speed = 3;
        trail.length = 0;
        scoreFlash = { active: true, x: W/4, y: H/2, life: 1, color: C.accent };
        spawnGoalEffect(W - 20, ball.y, C.accent, W/4);
        // Avatar reactions: p1 (and p3 in coop) bounce, p2 shakes
        avatarAnim.p1 = { type: 'bounce', life: 0.6 };
        if (state.gameMode === 'coop') avatarAnim.p3 = { type: 'bounce', life: 0.6 };
        avatarAnim.p2 = { type: 'shake', life: 0.6 };
        const humanWins = state.gameMode === 'coop' ? 'Spieler-Team' : 'Spieler 1';
        if (p1.score >= WIN_SCORE) { state.over = true; state.winner = humanWins; sound.win(); spawnWinParticles(); }
        else { sound.score(); resetBall(state.gameMode === 'duo' ? -1 : 1); initObstacles(); powerUps.length = 0; clearEffects(); }
      }
    }

    // ── Draw helpers ──────────────────────────────────────────────────────────
    function drawRoundedRect(x, y, w, h, r, fill, stroke, strokeW = 3) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
      if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
    }

    function drawOutlinedText(text, x, y, size, fill, outline, outlineW = 4) {
      ctx.font = `900 ${size}px 'Arial Black', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.lineWidth = outlineW;
      ctx.strokeStyle = outline;
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = fill;
      ctx.fillText(text, x, y);
    }

    // Draw a Brawl Stars style paddle (rounded rect with highlight)
    function drawPaddle(x, y, ph, fillColor, darkColor) {
      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

      drawRoundedRect(x, y, PADDLE_W, ph, 5, darkColor, '#000', 2);
      drawRoundedRect(x, y, PADDLE_W, ph, 5, fillColor, '#000', 2);

      // Highlight stripe
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(x + 2, y + 4, 4, ph - 8);
    }

    // Draw gem (Brawl Stars gem shape = diamond)
    function drawGem(x, y, size) {
      ctx.save();
      ctx.translate(x, y);

      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 10;

      // Gem body
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.65, -size * 0.1);
      ctx.lineTo(0, size);
      ctx.lineTo(-size * 0.65, -size * 0.1);
      ctx.closePath();
      ctx.fillStyle = C.gem;
      ctx.fill();
      ctx.strokeStyle = C.gemDark;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Shine
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(-size * 0.25, -size * 0.8);
      ctx.lineTo(size * 0.05, -size * 0.3);
      ctx.lineTo(-size * 0.3, -size * 0.3);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();

      ctx.restore();
    }

    // ── Draw background ───────────────────────────────────────────────────────

    // Draw a 5-pointed star
    function drawStar(cx, cy, r, fill, stroke, strokeW = 2) {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = (Math.PI / 5) * i - Math.PI / 2;
        const radius = i % 2 === 0 ? r : r * 0.42;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
    }

    // Draw a Brawl Stars style bush cluster
    function drawBush(cx, cy, size) {
      const blobs = [
        [0, 0, size], [-size * 0.7, size * 0.2, size * 0.75],
        [size * 0.7, size * 0.2, size * 0.75], [0, size * 0.55, size * 0.65],
      ];
      blobs.forEach(([dx, dy, r]) => {
        ctx.beginPath();
        ctx.arc(cx + dx, cy + dy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#1a5c1a';
        ctx.fill();
        ctx.strokeStyle = '#0d3a0d';
        ctx.lineWidth = 2;
        ctx.stroke();
        // highlight
        ctx.beginPath();
        ctx.arc(cx + dx - r * 0.2, cy + dy - r * 0.25, r * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(80,200,80,0.25)';
        ctx.fill();
      });
    }

    // Draw a wooden crate
    function drawCrate(x, y, size) {
      const s = size;
      drawRoundedRect(x - s/2, y - s/2, s, s, 4, '#8B5E3C', '#4a2e10', 2);
      // planks
      ctx.strokeStyle = '#4a2e10'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x - s/2 + 4, y); ctx.lineTo(x + s/2 - 4, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y - s/2 + 4); ctx.lineTo(x, y + s/2 - 4); ctx.stroke();
      // corner bolts
      [[-.38,-.38],[.38,-.38],[-.38,.38],[.38,.38]].forEach(([fx, fy]) => {
        ctx.beginPath();
        ctx.arc(x + fx*s, y + fy*s, 2.5, 0, Math.PI*2);
        ctx.fillStyle = '#c8903a'; ctx.fill();
        ctx.strokeStyle = '#4a2e10'; ctx.lineWidth = 1; ctx.stroke();
      });
    }

    // Small decorative gem (for field)
    function drawMiniGem(x, y, size, color = '#e84040') {
      ctx.save(); ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, -size); ctx.lineTo(size*0.6, -size*0.1);
      ctx.lineTo(0, size);  ctx.lineTo(-size*0.6, -size*0.1);
      ctx.closePath();
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();
    }

    function drawBackground() {
      // ── Grass base ──────────────────────────────────────────────────────────
      // Tile the field with alternating dark-green squares (like BS arena grass)
      const tileSize = 40;
      for (let ty = 0; ty < H / tileSize + 1; ty++) {
        for (let tx = 0; tx < W / tileSize + 1; tx++) {
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#1e5c1e' : '#1a521a';
          ctx.fillRect(tx * tileSize, ty * tileSize, tileSize, tileSize);
        }
      }

      // ── Dirt lane in center (gem grab lane) ─────────────────────────────────
      const laneW = 120;
      const laneGrad = ctx.createLinearGradient(W/2 - laneW/2, 0, W/2 + laneW/2, 0);
      laneGrad.addColorStop(0,   'transparent');
      laneGrad.addColorStop(0.2, 'rgba(120,80,30,0.35)');
      laneGrad.addColorStop(0.5, 'rgba(140,90,35,0.5)');
      laneGrad.addColorStop(0.8, 'rgba(120,80,30,0.35)');
      laneGrad.addColorStop(1,   'transparent');
      ctx.fillStyle = laneGrad;
      ctx.fillRect(W/2 - laneW/2, 0, laneW, H);

      // ── Bushes (corners + mid-sides) ────────────────────────────────────────
      ctx.globalAlpha = 0.82;
      // Corners
      drawBush(52,  48,  18);
      drawBush(W - 52, 48,  18);
      drawBush(52,  H - 48, 18);
      drawBush(W - 52, H - 48, 18);
      // Mid sides (flanking the paddles)
      drawBush(52,  H / 2, 16);
      drawBush(W - 52, H / 2, 16);
      ctx.globalAlpha = 1;

      // ── Crates drawn dynamically in draw() ──────────────────────────────────

      // ── Center circle (gem grab) ─────────────────────────────────────────────
      ctx.beginPath();
      ctx.arc(W/2, H/2, 38, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(245,196,0,0.25)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(W/2, H/2, 38, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(245,196,0,0.07)';
      ctx.fill();
      // Mini gem icon in center
      drawMiniGem(W/2, H/2, 10, 'rgba(232,64,64,0.35)');

      // ── Center dashed divider ────────────────────────────────────────────────
      ctx.setLineDash([12, 14]);
      ctx.strokeStyle = 'rgba(245,196,0,0.35)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
      ctx.setLineDash([]);

      // ── Arena border (layered, Brawl Stars style) ────────────────────────────
      // Outer dark outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 12;
      ctx.strokeRect(0, 0, W, H);

      // Gold border
      ctx.strokeStyle = C.accent;
      ctx.lineWidth = 7;
      ctx.strokeRect(3.5, 3.5, W - 7, H - 7);

      // Inner dark line
      ctx.strokeStyle = '#7a5200';
      ctx.lineWidth = 2;
      ctx.strokeRect(8, 8, W - 16, H - 16);

      // ── Corner stars ────────────────────────────────────────────────────────
      const corners = [[18, 18], [W-18, 18], [18, H-18], [W-18, H-18]];
      corners.forEach(([cx, cy]) => {
        drawStar(cx, cy, 11, C.accent, '#7a5200', 2);
      });

      // ── Score panel frames ───────────────────────────────────────────────────
      // Left panel
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#f5c400';
      ctx.beginPath();
      ctx.arc(W/4, 55, 42, 0, Math.PI*2);
      ctx.fill();
      // Right panel
      ctx.beginPath();
      ctx.arc(3*W/4, 55, 42, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ── Draw menu ─────────────────────────────────────────────────────────────
    const MENU_MODES = [
      { label: '1 Spieler',    key: 'solo' },
      { label: '2 Spieler',    key: 'duo'  },
      { label: 'Co-Op vs Bot', key: 'coop' },
    ];

    function drawMenu() {
      if (state.menuPage === 'brawlers') { drawBrawlerSelect(); return; }

      drawBackground();

      // Title
      drawOutlinedText('BRAWL', W/2, 90, 72, C.accent, '#000', 6);
      drawOutlinedText('PONG',  W/2, 148, 72, '#ffffff', '#000', 6);

      // Mode buttons
      MENU_MODES.forEach((m, i) => {
        const by = 210 + i * 68;
        const active = state.gameMode === m.key;
        const fill   = active ? C.accent    : '#2d1b5e';
        const border = active ? '#fff'      : '#4a2d8a';
        const tColor = active ? '#1b1035'   : C.textGray;

        if (active) {
          ctx.shadowColor = C.accent;
          ctx.shadowBlur = 15;
        }
        drawRoundedRect(W/2 - 150, by - 24, 300, 48, 10, fill, border, 3);
        ctx.shadowBlur = 0;
        drawOutlinedText(m.label, W/2, by + 10, 22, tColor, active ? '#a06800' : 'transparent', 2);
      });

      // Difficulty
      const showDiff = state.gameMode === 'solo' || state.gameMode === 'coop';
      if (showDiff) {
        drawOutlinedText('SCHWIERIGKEIT', W/2, 432, 16, C.textGray, 'transparent');
        ['leicht', 'mittel', 'schwer'].forEach((d, i) => {
          const dx = W/2 - 160 + i * 160;
          const active = difficulty === d;
          if (active) { ctx.shadowColor = C.accent; ctx.shadowBlur = 10; }
          drawRoundedRect(dx - 58, 440, 116, 34, 8,
            active ? C.accent : '#2d1b5e',
            active ? '#fff' : '#4a2d8a', 2);
          ctx.shadowBlur = 0;
          drawOutlinedText(d.toUpperCase(), dx, 464, 15,
            active ? '#1b1035' : C.textGray, 'transparent');
        });
      }

      drawOutlinedText('ENTER: WEITER  •  ↑/↓: MODUS  •  ←/→: SCHWIERIGKEIT',
        W/2, H - 14, 13, C.textGray, 'transparent');
    }

    function drawBrawlerSelect() {
      drawBackground();
      ctx.fillStyle = 'rgba(10,5,25,0.55)';
      ctx.fillRect(0, 0, W, H);

      const isDuo  = state.gameMode === 'duo';
      const isCoop = state.gameMode === 'coop';
      const activeTurn   = brawlerTurn;
      const activeCursor = brawlerCursor[activeTurn];
      const activeColor  = activeTurn === 'p1' ? C.accent : activeTurn === 'p3' ? C.coopP3 : C.paddle2;
      const activeLabel  = activeTurn === 'p1' ? 'SPIELER 1' : activeTurn === 'p3' ? 'SPIELER 2 (Co-Op)' : 'SPIELER 2';

      // Title shows whose turn it is
      drawOutlinedText(`${activeLabel}: WÄHLE DEINEN BRAWLER`, W/2, 42, 24, activeColor, '#000', 4);

      // Cards — always ←/→ for active player, centered
      const cardW = 110, cardH = 130, cardSpacing = 120;
      const totalW = BRAWLERS.length * cardSpacing - (cardSpacing - cardW);
      const startX = W / 2 - totalW / 2 + cardW / 2;

      BRAWLERS.forEach((brawler, i) => {
        const cardX = startX + i * cardSpacing;
        const cardY = 72;
        const isSelected = i === activeCursor;

        const cardFill   = isSelected ? `rgba(${activeColor === C.accent ? '245,196,0' : '232,64,64'},0.2)` : 'rgba(30,15,70,0.75)';
        const cardBorder = isSelected ? activeColor : '#4a2d8a';
        if (isSelected) { ctx.shadowColor = activeColor; ctx.shadowBlur = 16; }
        drawRoundedRect(cardX - cardW/2, cardY, cardW, cardH, 12, cardFill, cardBorder, isSelected ? 3 : 1.5);
        ctx.shadowBlur = 0;

        drawBrawlerPortrait(brawler, cardX, cardY + 58, 40);
        drawOutlinedText(brawler.name, cardX, cardY + cardH - 10, 14,
          isSelected ? activeColor : C.textGray, 'transparent');

        if (isSelected) drawOutlinedText('▼', cardX, cardY - 8, 16, activeColor, '#000', 2);
      });

      // Show confirmed P1 portrait top-left when it's the second player's turn
      if ((isDuo || isCoop) && activeTurn !== 'p1') {
        const confirmed = BRAWLERS[brawlerCursor.p1];
        drawOutlinedText('S1:', 46, 82, 13, C.accent, 'transparent');
        ctx.save();
        ctx.beginPath(); ctx.arc(80, 92, 22, 0, Math.PI * 2);
        ctx.fillStyle = '#1b1035'; ctx.fill();
        ctx.strokeStyle = C.accent; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
        drawBrawlerPortrait(confirmed, 80, 92, 20);
        drawOutlinedText(confirmed.name, 80, 120, 11, C.accent, 'transparent');
      }

      // Hint
      const isFirstTurn = activeTurn === 'p1';
      const hint = isFirstTurn
        ? '←/→: Brawler  •  ENTER: Bestätigen  •  ESC: Zurück'
        : '←/→: Brawler  •  ENTER: Spielen  •  ESC: Zurück zu S1';
      drawOutlinedText(hint, W/2, H - 14, 13, C.textGray, 'transparent');
    }

    // ── Draw VS intro screen ──────────────────────────────────────────────────
    function drawVSScreen() {
      drawBackground();

      // Dark overlay
      ctx.fillStyle = 'rgba(10,5,25,0.7)';
      ctx.fillRect(0, 0, W, H);

      const isCoop = state.gameMode === 'coop';

      // Slide-in progress: fast 0.6s slide from start of timer
      const elapsed = 2.0 - state.vsTimer;
      const progress = Math.min(1, elapsed / 0.6);
      const easedProgress = 1 - Math.pow(1 - progress, 3);

      // Left side: p1 (+ p3 in coop stacked)
      const leftFinalX = W / 4;
      const leftStartX = -80;
      const leftX = leftStartX + (leftFinalX - leftStartX) * easedProgress;

      // Right side: p2/bot
      const rightFinalX = 3 * W / 4;
      const rightStartX = W + 80;
      const rightX = rightStartX + (rightFinalX - rightStartX) * easedProgress;

      const avatarSize = 70;

      // Draw left avatar(s)
      if (isCoop) {
        // p1 above center, p3 below
        const p1y = H / 2 - 45;
        const p3y = H / 2 + 45;
        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.beginPath(); ctx.arc(leftX, H/2, 85, 0, Math.PI * 2);
        ctx.fillStyle = selectedBrawler.p1.color; ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
        // p1 portrait
        ctx.save();
        ctx.beginPath(); ctx.arc(leftX, p1y, 38, 0, Math.PI * 2);
        ctx.clip();
        drawBrawlerPortrait(selectedBrawler.p1, leftX, p1y, 38);
        ctx.restore();
        ctx.beginPath(); ctx.arc(leftX, p1y, 38, 0, Math.PI * 2);
        ctx.strokeStyle = selectedBrawler.p1.color; ctx.lineWidth = 3; ctx.stroke();
        // p3 portrait
        ctx.save();
        ctx.beginPath(); ctx.arc(leftX, p3y, 38, 0, Math.PI * 2);
        ctx.clip();
        drawBrawlerPortrait(selectedBrawler.p3, leftX, p3y, 38);
        ctx.restore();
        ctx.beginPath(); ctx.arc(leftX, p3y, 38, 0, Math.PI * 2);
        ctx.strokeStyle = selectedBrawler.p3.color; ctx.lineWidth = 3; ctx.stroke();
        // Labels
        drawOutlinedText('SPIELER 1', leftX, H/2 - 95, 16, selectedBrawler.p1.color, '#000', 3);
        drawOutlinedText(selectedBrawler.p1.name, leftX, p3y + 52, 13, selectedBrawler.p1.color, 'transparent');
        drawOutlinedText(selectedBrawler.p3.name, leftX, p3y + 68, 13, selectedBrawler.p3.color, 'transparent');
      } else {
        // Single p1 avatar
        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.beginPath(); ctx.arc(leftX, H/2, 85, 0, Math.PI * 2);
        ctx.fillStyle = selectedBrawler.p1.color; ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
        ctx.save();
        ctx.beginPath(); ctx.arc(leftX, H/2, avatarSize, 0, Math.PI * 2);
        ctx.clip();
        drawBrawlerPortrait(selectedBrawler.p1, leftX, H/2, avatarSize);
        ctx.restore();
        ctx.beginPath(); ctx.arc(leftX, H/2, avatarSize, 0, Math.PI * 2);
        ctx.strokeStyle = selectedBrawler.p1.color; ctx.lineWidth = 4; ctx.stroke();
        drawOutlinedText('SPIELER 1', leftX, H/2 - avatarSize - 14, 16, selectedBrawler.p1.color, '#000', 3);
        drawOutlinedText(selectedBrawler.p1.name, leftX, H/2 + avatarSize + 18, 14, selectedBrawler.p1.color, 'transparent');
      }

      // Draw right avatar (p2/bot)
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.beginPath(); ctx.arc(rightX, H/2, 85, 0, Math.PI * 2);
      ctx.fillStyle = selectedBrawler.p2.color; ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.save();
      ctx.beginPath(); ctx.arc(rightX, H/2, avatarSize, 0, Math.PI * 2);
      ctx.clip();
      drawBrawlerPortrait(selectedBrawler.p2, rightX, H/2, avatarSize);
      ctx.restore();
      ctx.beginPath(); ctx.arc(rightX, H/2, avatarSize, 0, Math.PI * 2);
      ctx.strokeStyle = selectedBrawler.p2.color; ctx.lineWidth = 4; ctx.stroke();
      const rightLabel2 = state.gameMode === 'duo' ? 'SPIELER 2' : 'BOT';
      drawOutlinedText(rightLabel2, rightX, H/2 - avatarSize - 14, 16, selectedBrawler.p2.color, '#000', 3);
      drawOutlinedText(selectedBrawler.p2.name, rightX, H/2 + avatarSize + 18, 14, selectedBrawler.p2.color, 'transparent');

      // VS text — appears with a pop scale when vsTimer < 1.5
      let vsScale = 1;
      if (state.vsTimer < 1.5) {
        vsScale = 1 + 0.3 * Math.abs(Math.sin(state.vsTimer * Math.PI * 3));
      }
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.scale(vsScale, vsScale);
      drawOutlinedText('VS!', 0, 0, 64, '#f5c400', '#000', 6);
      ctx.restore();
    }

    // ── Draw game ─────────────────────────────────────────────────────────────
    function draw() {
      if (state.mode === 'menu') { drawMenu(); return; }

      // VS intro screen
      if (state.vsTimer > 0) { drawVSScreen(); return; }

      ctx.save();
      ctx.translate(shake.x, shake.y);
      drawBackground();

      // Score display
      const leftLabel  = state.gameMode === 'coop' ? 'TEAM' : 'S1';
      const rightLabel = state.gameMode === 'duo'  ? 'S2'   : 'BOT';

      drawOutlinedText(String(p1.score), W/4,       62, 52, C.accent,  '#000', 5);
      drawOutlinedText(String(p2.score), 3*W/4,     62, 52, '#ffffff', '#000', 5);
      drawOutlinedText(leftLabel,  W/4,       84, 13, C.textGray, 'transparent');
      drawOutlinedText(rightLabel, 3*W/4,     84, 13, C.textGray, 'transparent');

      // Brawler avatars
      function drawAvatar(brawler, cx, cy, r, animSide) {
        const anim = animSide ? avatarAnim[animSide] : null;
        ctx.save();
        if (anim && anim.life > 0) {
          const life = anim.life;
          if (anim.type === 'bounce') {
            const scale = 1 + 0.35 * Math.sin(life * Math.PI);
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);
          } else if (anim.type === 'shake') {
            const offsetX = 6 * Math.sin(life * Math.PI * 8) * life;
            ctx.translate(offsetX, 0);
          }
        }
        ctx.beginPath(); ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
        ctx.fillStyle = '#1b1035'; ctx.fill();
        drawBrawlerPortrait(brawler, cx, cy, r);
        ctx.beginPath(); ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
        ctx.strokeStyle = brawler.color; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.restore();
      }

      if (state.gameMode === 'coop') {
        // Two team avatars left of score, side by side
        drawAvatar(selectedBrawler.p1, W/4 - 62, 52, 22, 'p1');
        drawAvatar(selectedBrawler.p3, W/4 - 30, 52, 22, 'p3');
        // Small "+" between them
        drawOutlinedText('+', W/4 - 46, 78, 10, C.textGray, 'transparent');
      } else {
        drawAvatar(selectedBrawler.p1, W/4 - 52, 52, 26, 'p1');
      }
      drawAvatar(selectedBrawler.p2, 3*W/4 + 52, 52, 26, 'p2');

      // Paddles
      const p1x = 20;
      const p2x = W - 20 - PADDLE_W;

      if (state.gameMode === 'coop') {
        drawPaddle(p1x, p1.y, COOP_PADDLE_H, C.paddle1, C.paddle1Dark);
        drawPaddle(p1x, p3.y, COOP_PADDLE_H, C.coopP3, C.coopP3Dark);
      } else {
        drawPaddle(p1x, p1.y, PADDLE_H, C.paddle1, C.paddle1Dark);
      }
      drawPaddle(p2x, p2.y, PADDLE_H, C.paddle2, C.paddle2Dark);

      // Obstacles
      for (const obs of obstacles) {
        if (obs.dead) continue;
        const flash = obs.hitLife > 0;
        ctx.globalAlpha = flash ? 1 : 0.9;
        if (flash) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 20 * obs.hitLife; }
        drawCrate(obs.cx, obs.cy, obs.size);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // HP bar above crate
        const barW = obs.size;
        const bx = obs.cx - barW / 2;
        const by = obs.cy - obs.size / 2 - 10;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, barW, 5);
        ctx.fillStyle = obs.hp === obs.maxHp ? '#4caf50' : obs.hp === 1 ? '#f44336' : '#ff9800';
        ctx.fillRect(bx, by, barW * (obs.hp / obs.maxHp), 5);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, barW, 5);
      }

      // Ball trail
      trail.forEach((t, i) => {
        const alpha = (i / TRAIL_LEN) * 0.45;
        const size  = (BALL_SIZE / 2) * (i / TRAIL_LEN) * 0.9;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = C.gem;
        ctx.beginPath();
        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Ball glow
      ctx.shadowColor = C.gem;
      ctx.shadowBlur = 18;
      drawGem(ball.x, ball.y, BALL_SIZE / 2 + 2);
      ctx.shadowBlur = 0;

      // Serve hint
      if (state.serving && state.vsTimer === 0) {
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 220);
        // Pulsing ring around ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_SIZE + 6 * pulse, 0, Math.PI * 2);
        ctx.strokeStyle = C.accent;
        ctx.lineWidth = 2;
        ctx.globalAlpha = pulse * 0.6;
        ctx.stroke();
        ctx.globalAlpha = 1;
        // Hint text above ball
        ctx.globalAlpha = pulse;
        drawOutlinedText('SPACE: Aufschlag', ball.x, ball.y - 28, 16, C.accent, '#000', 3);
        ctx.globalAlpha = 1;
      }

      // Score flash ring
      if (scoreFlash.active) {
        const r = (1 - scoreFlash.life) * 90 + 30;
        ctx.globalAlpha = scoreFlash.life * 0.5;
        ctx.beginPath();
        ctx.arc(scoreFlash.x, scoreFlash.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = scoreFlash.color;
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Particles
      particles.forEach(p => {
        const alpha = Math.min(p.life, 1);
        ctx.globalAlpha = alpha;
        if (p.star) {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          drawStar(0, 0, p.size * Math.min(p.life, 1), p.color, '#000', 1);
          ctx.restore();
          p.rot += p.rotV;
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * Math.min(p.life, 1), 0, Math.PI * 2);
          ctx.fill();
        }
        p.vy += 0.18;
      });
      ctx.globalAlpha = 1;

      // Shockwave rings
      shockwaves.forEach(sw => {
        ctx.globalAlpha = sw.life * 0.7;
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
        ctx.strokeStyle = sw.color;
        ctx.lineWidth = 4 * sw.life;
        ctx.stroke();
        // Inner fill flash
        ctx.globalAlpha = sw.life * 0.08;
        ctx.fillStyle = sw.color;
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Power-up items on field
      powerUps.forEach(pu => {
        const bob = Math.sin(pu.pulse) * 4;
        const r = 16 + Math.sin(pu.pulse * 1.5) * 2;
        // Glow
        ctx.shadowColor = pu.type.color;
        ctx.shadowBlur = 18;
        // Background circle
        ctx.beginPath();
        ctx.arc(pu.x, pu.y + bob, r, 0, Math.PI * 2);
        ctx.fillStyle = '#1b1035';
        ctx.fill();
        ctx.strokeStyle = pu.type.color;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Icon text
        drawOutlinedText(pu.type.label, pu.x, pu.y + bob + 5, 11, pu.type.color, '#000', 2);
      });

      // Shield walls + timer
      [{ side: 'p1', wallX: SHIELD_X.p1, timerX: 20 + PADDLE_W + 4 }, { side: 'p2', wallX: SHIELD_X.p2, timerX: W - 20 - PADDLE_W - 10 }].forEach(({ side, wallX, timerX }) => {
        const eff = effects[side];
        if (!eff) return;
        const progress = eff.timeLeft / eff.type.duration;
        const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 120);

        // Full-height glowing wall
        const wallW = 6;
        const wx = side === 'p1' ? wallX : wallX - wallW;
        const grad = ctx.createLinearGradient(wx, 0, wx + wallW, 0);
        grad.addColorStop(0, `rgba(167,139,250,0)`);
        grad.addColorStop(side === 'p1' ? 0.6 : 0.4, `rgba(167,139,250,${0.85 * pulse})`);
        grad.addColorStop(1, `rgba(167,139,250,0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(wx, 0, wallW, H);

        // Outer glow columns
        ctx.shadowColor = '#a78bfa';
        ctx.shadowBlur = 22 * pulse;
        ctx.fillStyle = `rgba(167,139,250,${0.3 * pulse})`;
        ctx.fillRect(wx, 0, wallW, H);
        ctx.shadowBlur = 0;

        // Hex segments along the wall (energy field look)
        for (let sy = 10; sy < H; sy += 28) {
          ctx.globalAlpha = pulse * 0.6;
          ctx.fillStyle = '#c4b5fd';
          ctx.fillRect(wx + 1, sy, wallW - 2, 14);
        }
        ctx.globalAlpha = 1;

        // Timer bar next to paddle
        const ph = paddleH(side === 'p1' ? p1 : p2);
        const py = side === 'p1' ? p1.y : p2.y;
        ctx.fillStyle = '#1b1035';
        ctx.fillRect(timerX, py, 6, ph);
        ctx.fillStyle = '#a78bfa';
        ctx.fillRect(timerX, py + ph * (1 - progress), 6, ph * progress);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.strokeRect(timerX, py, 6, ph);

        // Paddle glow
        ctx.shadowColor = '#a78bfa';
        ctx.shadowBlur = 18;
        const px2 = side === 'p1' ? 20 : W - 20 - PADDLE_W;
        drawPaddle(px2, py, ph, side === 'p1' ? C.paddle1 : C.paddle2, side === 'p1' ? C.paddle1Dark : C.paddle2Dark);
        ctx.shadowBlur = 0;
      });

      // Popups (+1 and power-up labels)
      popups.forEach(p => {
        const alpha = Math.min(p.life * 1.5, 1);
        ctx.globalAlpha = alpha;
        drawOutlinedText(p.label || '+1', p.x, p.y, p.label ? 20 : 42, p.color, '#000', p.label ? 3 : 5);
      });
      ctx.globalAlpha = 1;

      ctx.restore(); // end shake transform

      // Overlays
      if (state.over) {
        ctx.fillStyle = 'rgba(10,5,25,0.72)';
        ctx.fillRect(0, 0, W, H);
        // Glowing panel (taller to fit portrait)
        ctx.shadowColor = C.accent;
        ctx.shadowBlur = 30;
        drawRoundedRect(W/2 - 240, H/2 - 155, 480, 245, 18, '#1b1035', C.accent, 5);
        ctx.shadowBlur = 0;

        // Determine winner brawler(s)
        const isTeamWin = state.winner && state.winner.includes('Team');
        const isBotWin  = state.winner && state.winner.includes('Bot');
        const winBrawler = isBotWin ? selectedBrawler.p2 : selectedBrawler.p1;

        // Portrait center position
        const portraitCx = W / 2;
        const portraitCy = H / 2 - 110;
        const portraitR  = 70;

        if (isTeamWin) {
          // Show p1 and p3 side by side
          const brawlers = [selectedBrawler.p1, selectedBrawler.p3];
          const offsets  = [-45, 45];
          brawlers.forEach((b, idx) => {
            const pcx = portraitCx + offsets[idx];
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.beginPath(); ctx.arc(pcx, portraitCy, 55, 0, Math.PI * 2);
            ctx.fillStyle = b.color; ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
            ctx.save();
            ctx.beginPath(); ctx.arc(pcx, portraitCy, 38, 0, Math.PI * 2);
            ctx.clip();
            drawBrawlerPortrait(b, pcx, portraitCy, 38);
            ctx.restore();
            ctx.beginPath(); ctx.arc(pcx, portraitCy, 38, 0, Math.PI * 2);
            ctx.strokeStyle = b.color; ctx.lineWidth = 4; ctx.stroke();
            const starAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
            starAngles.forEach(a => drawStar(pcx + Math.cos(a)*55, portraitCy + Math.sin(a)*55, 7, C.accent, '#7a5200', 1.5));
          });
        } else {
          // Glowing circle background
          ctx.save();
          ctx.globalAlpha = 0.2;
          ctx.beginPath(); ctx.arc(portraitCx, portraitCy, 80, 0, Math.PI * 2);
          ctx.fillStyle = winBrawler.color; ctx.fill();
          ctx.globalAlpha = 1;
          ctx.restore();
          // Portrait clipped to circle
          ctx.save();
          ctx.beginPath(); ctx.arc(portraitCx, portraitCy, portraitR, 0, Math.PI * 2);
          ctx.clip();
          drawBrawlerPortrait(winBrawler, portraitCx, portraitCy, portraitR);
          ctx.restore();
          // Colored stroke ring
          ctx.beginPath(); ctx.arc(portraitCx, portraitCy, portraitR, 0, Math.PI * 2);
          ctx.strokeStyle = winBrawler.color; ctx.lineWidth = 4; ctx.stroke();
          // 4 stars at compass positions
          const starAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
          starAngles.forEach(a => drawStar(portraitCx + Math.cos(a)*95, portraitCy + Math.sin(a)*95, 10, C.accent, '#7a5200', 2));
        }

        // Win text shifted down ~60px
        drawStar(W/2 - 190, H/2 + 30, 20, C.accent, '#7a5200', 2);
        drawStar(W/2 + 190, H/2 + 30, 20, C.accent, '#7a5200', 2);
        drawOutlinedText(`${state.winner} gewinnt!`, W/2, H/2 + 46, 42, C.accent, '#000', 5);
        drawOutlinedText('ENTER: Nochmal  •  ESC: Menü', W/2, H/2 + 104, 18, C.textGray, 'transparent');
      } else if (state.paused) {
        ctx.fillStyle = 'rgba(10,5,25,0.72)';
        ctx.fillRect(0, 0, W, H);
        ctx.shadowColor = C.accent;
        ctx.shadowBlur = 20;
        drawRoundedRect(W/2 - 160, H/2 - 70, 320, 130, 16, '#1b1035', C.accent, 4);
        ctx.shadowBlur = 0;
        drawOutlinedText('PAUSE', W/2, H/2 - 8, 52, C.accent, '#000', 5);
        drawOutlinedText('ESC: Menü', W/2, H/2 + 42, 17, C.textGray, 'transparent');
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    // ── Input ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (state.mode === 'menu') {
        if (state.menuPage === 'brawlers') {
          const isDuo  = state.gameMode === 'duo';
          const isCoop = state.gameMode === 'coop';
          const needsTwoSelections = isDuo || isCoop;
          const secondSlot = isCoop ? 'p3' : 'p2';

          if (e.key === 'ArrowLeft') {
            brawlerCursor[brawlerTurn] = (brawlerCursor[brawlerTurn] - 1 + BRAWLERS.length) % BRAWLERS.length;
          }
          if (e.key === 'ArrowRight') {
            brawlerCursor[brawlerTurn] = (brawlerCursor[brawlerTurn] + 1) % BRAWLERS.length;
          }
          if (e.key === 'Enter') {
            if (needsTwoSelections && brawlerTurn === 'p1') {
              brawlerTurn = secondSlot;
              // Avoid same brawler as P1
              if (brawlerCursor[secondSlot] === brawlerCursor.p1) {
                brawlerCursor[secondSlot] = (brawlerCursor.p1 + 1) % BRAWLERS.length;
              }
            } else {
              startGame();
            }
          }
          if (e.key === 'Escape') {
            if (needsTwoSelections && brawlerTurn !== 'p1') {
              brawlerTurn = 'p1';
            } else {
              state.menuPage = 'mode';
              brawlerTurn = 'p1';
            }
          }
          e.preventDefault();
          return;
        }

        // Mode selection page
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          const idx = MENU_MODES.findIndex(m => m.key === state.gameMode);
          state.gameMode = MENU_MODES[(idx + (e.key === 'ArrowDown' ? 1 : -1) + MENU_MODES.length) % MENU_MODES.length].key;
        }
        const showDiff = state.gameMode === 'solo' || state.gameMode === 'coop';
        if (showDiff && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
          const diffs = ['leicht', 'mittel', 'schwer'];
          const idx = diffs.indexOf(difficulty);
          difficulty = diffs[(idx + (e.key === 'ArrowRight' ? 1 : -1) + 3) % 3];
        }
        if (e.key === 'Enter') state.menuPage = 'brawlers';
        e.preventDefault();
        return;
      }

      if (e.key === 'Escape') { state.mode = 'menu'; state.menuPage = 'mode'; state.vsTimer = 0; brawlerTurn = 'p1'; infoEl.textContent = ''; return; }
      if (e.key === ' ') {
        if (state.serving && state.vsTimer === 0) { serveBall(); e.preventDefault(); }
        return;
      }
      if (e.key === 'Enter') {
        if (state.over) startGame(); else state.paused = !state.paused;
        return;
      }

      const isCoop = state.gameMode === 'coop';
      if (e.key === 'w') { p1.up = true; e.preventDefault(); }
      if (e.key === 's') { p1.down = true; e.preventDefault(); }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isCoop) p3.up = true;
        else if (state.gameMode === 'solo') p1.up = true;
        else p2.up = true;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isCoop) p3.down = true;
        else if (state.gameMode === 'solo') p1.down = true;
        else p2.down = true;
      }
    });

    document.addEventListener('keyup', e => {
      const isCoop = state.gameMode === 'coop';
      if (e.key === 'w') p1.up = false;
      if (e.key === 's') p1.down = false;
      if (e.key === 'ArrowUp') {
        if (isCoop) p3.up = false;
        else if (state.gameMode === 'solo') p1.up = false;
        else p2.up = false;
      }
      if (e.key === 'ArrowDown') {
        if (isCoop) p3.down = false;
        else if (state.gameMode === 'solo') p1.down = false;
        else p2.down = false;
      }
    });

    loop();
  </script>
</body>
</html>
